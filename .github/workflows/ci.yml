name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tp3-app:latest .

      - name: Run tests
        run: docker run --rm ${{ secrets.DOCKER_USERNAME }}/tp3-app:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/tp3-app:latest